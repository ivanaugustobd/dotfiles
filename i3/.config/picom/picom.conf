# Shadows
shadow = true;
shadow-radius = 15;
shadow-offset-x = -12;
shadow-offset-y = -12;

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Transparency / opacity
frame-opacity = 0.9;

# Corners
corner-radius = 15

# Blur
blur-method = "dual_kawase"
blur-background = true
blur-kern = "3x3box";

# General settings
backend = "glx"
dithered-present = false;
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

# Rule-based per-window options
rules: ({
  # Window type rules
  match = "window_type = 'tooltip'";
  fade = false;
  shadow = true;
  opacity = 0.75;
  full-shadow = false;
}, {
  match = "window_type = 'dock' || "
          "window_type = 'desktop' || "
          "_GTK_FRAME_EXTENTS@";
  blur-background = false;
}, {
  match = "window_type = 'dock' || "
          "window_type = 'desktop'";
  corner-radius = 0;
}, {
  match = "fullscreen",
  corner-radius = 0;
}, {
  # Generic notification rules
  match = "name = 'Notification' || "
          "class_g ?= 'Notify-osd' || "
          "_GTK_FRAME_EXTENTS@";
  shadow = false;
}, {
  # Specific app rules
  match = "class_g ?= 'Dunst' || "
          "class_g ?= 'steam_proton'";
  shadow = false;
  blur-background = false;
}, {
  # Bars
  match = "class_g ?= 'Polybar'";
  shadow = false;
}, {
  # Opacity exceptions
  match = "class_g ~?= '^(slack|signal|steam|thunar|telegramdesktop|telegram-desktop)$'";
  opacity = 0.9;
})
