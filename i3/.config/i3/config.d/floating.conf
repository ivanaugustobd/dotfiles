# App floating rules
for_window [class="$class_1password"] floating enable
for_window [class="$class_avd"] floating enable
for_window [class="$class_blueman_manager"] floating enable
for_window [class="$class_firefox" title="$title_firefox_about"] floating enable
for_window [class="$class_gnome_calculator"] floating enable
for_window [class="$class_haguichi"] floating enable
for_window [class="$class_kitty"] floating enable
for_window [class="$class_nitrogen"] floating enable
for_window [class="$class_obs"] floating enable
for_window [class="$class_pavucontrol"] floating enable, move position pointer
for_window [class="$class_protonvpn"] floating enable
for_window [class="$class_qt6ct"] floating enable
for_window [class="$class_steam" title="$title_steam"] floating enable
for_window [class="$class_kitty" title="$title_task_manager"] floating enable, move position center
for_window [class="$class_wpg"] floating enable
for_window [class="$class_yad"] floating enable

# Generic floating rules
for_window [window_role="pop-up"] floating enable
for_window [window_type="dialog"] floating enable
for_window [window_type="splash"] floating enable
for_window [window_type="utility"] floating enable
