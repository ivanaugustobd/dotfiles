# Pywal colors from Xresources (fallback hex if Xresources fails)
set_from_resource $bg       i3wm.background #000000
set_from_resource $fg       i3wm.foreground #ffffff
set_from_resource $accent   i3wm.color1     #ff0000
set_from_resource $inactive i3wm.color8     #555555

# Then define the client colors using variables
# class                  border    background text indicator child_border
client.focused           $accent   $bg        $fg  $accent   $accent
client.focused_inactive  $inactive $bg        $fg  $inactive $inactive
client.focused_tab_title $inactive $bg        $fg  $inactive $inactive
client.unfocused         $inactive $bg        $fg  $inactive $inactive
client.urgent            $accent   $bg        $fg  $accent   $accent
client.placeholder       $inactive $bg        $fg  $inactive $bg

# class                  background
client.background        $bg
