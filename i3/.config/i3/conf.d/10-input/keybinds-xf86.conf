# XF86 special key bindings
bindsym XF86AudioRaiseVolume exec --no-startup-id ~/.config/i3/scripts/volume.sh up
bindsym XF86AudioLowerVolume exec --no-startup-id ~/.config/i3/scripts/volume.sh down
bindsym XF86AudioMute exec --no-startup-id ~/.config/i3/scripts/volume.sh mute
bindsym XF86AudioMicMute exec --no-startup-id wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindsym XF86AudioPlay exec --no-startup-id playerctl play-pause
bindsym XF86AudioNext exec --no-startup-id playerctl next
bindsym XF86AudioPrev exec --no-startup-id playerctl previous
bindsym XF86AudioStop exec --no-startup-id playerctl stop
bindsym XF86Calculator exec --no-startup-id speedcrunch
bindsym XF86HomePage exec --no-startup-id xdg-open about:blank
bindsym XF86WWW exec --no-startup-id xdg-open about:blank
bindsym XF86Mail exec --no-startup-id xdg-open "https://mail.protonmail.com/"
bindsym XF86Search exec --no-startup-id xdg-open "https://search.brave.com/"
