# Launchers and utility bindings

## System
bindsym $mod+Return exec --no-startup-id $term
bindsym $mod+Escape exec --no-startup-id ~/.config/i3/scripts/btop.sh

## Utils
bindsym $mod+a exec --no-startup-id "rofi -modi drun -show drun"
bindsym $mod+b exec --no-startup-id xdg-open about:blank
bindsym $mod+e exec --no-startup-id $fileManager
bindsym $mod+p exec --no-startup-id code ~/.dotfiles
bindsym $mod+v exec --no-startup-id pavucontrol-qt

## Apps
bindsym $mod+c workspace $ws3; exec --no-startup-id code
bindsym $mod+n workspace $ws7; exec --no-startup-id flatpak run com.logseq.Logseq
